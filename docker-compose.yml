services:

  # ================================
  # BASE DE DATOS
  # ================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: documind_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ❌ Sin 'ports': Postgres NO está expuesto al host.
    # Solo accesible internamente via backend_network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend_network   # Solo habla con API y Worker

  # ================================
  # REDIS (cola de tareas)
  # ================================
  redis:
    image: redis:7-alpine
    container_name: documind_redis
    volumes:
      - redis_data:/data
    # ❌ Sin 'ports': Redis NO expuesto al host.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend_network   # Solo habla con API y Worker

  # ================================
  # MINIO (S3 local)
  # ================================
  minio:
    image: minio/minio:latest
    container_name: documind_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"   # ✅ Solo la consola web expuesta al host (para desarrollo)
      # Puerto 9000 (API) NO expuesto: solo la API y Worker lo usan internamente
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend_network   # Solo habla con API y Worker

  # ================================
  # BACKEND (FastAPI)
  # ================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: documind_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"   # ✅ Expuesto al host (el frontend lo consume desde el browser)
    environment:
      - APP_ENV=${APP_ENV}
      - SECRET_KEY=${SECRET_KEY}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres     # resuelve via backend_network
      - POSTGRES_PORT=5432
      - REDIS_URL=${REDIS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - MINIO_ENDPOINT=http://minio:9000   # resuelve via backend_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - backend_network    # Puede hablar con Postgres, Redis, Minio
      - frontend_network   # Puede recibir peticiones del Frontend

  # ================================
  # WORKER (Celery — tareas async)
  # ================================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: documind_worker
    command: celery -A app.worker.celery_app worker --loglevel=info --queues=documents,agents
    volumes:
      - ./backend:/app
    # ❌ Sin 'ports': el Worker nunca recibe conexiones entrantes
    environment:
      - APP_ENV=${APP_ENV}
      - SECRET_KEY=${SECRET_KEY}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=${REDIS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - MINIO_ENDPOINT=http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network   # Solo necesita datos, nunca recibe del frontend

  # ================================
  # FRONTEND (React)
  # ================================
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: documind_frontend
  #   volumes:
  #     - ./frontend/src:/app/src
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - VITE_API_URL=http://localhost:8000   # El browser resuelve esto, no Docker
  #   depends_on:
  #     - api
  #   networks:
  #     - frontend_network   # Solo puede hablar con la API, NUNCA con Postgres/Redis/Minio

# ================================
# VOLÚMENES
# ================================
volumes:
  postgres_data:
  redis_data:
  minio_data:

# ================================
# REDES SEGMENTADAS
# ================================
networks:
  # Red de datos: solo backend toca aquí
  backend_network:
    driver: bridge

  # Red pública: frontend → API
  frontend_network:
    driver: bridge





